name: Java CI with Docker and Oracle

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      oracle:
        image: gvenzl/oracle-xe:latest
        env:
          ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
        ports:
          - 1521:1521
        options: >-
          --health-cmd "exit 0"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        run: mvn -B package --file springApp/AztlanShop/pom.xml
        env:
          SPRING_DATASOURCE_URL: jdbc:oracle:thin:@localhost:1521/xe
          SPRING_DATASOURCE_USERNAME: system
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SPRING_MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          SPRING_MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}