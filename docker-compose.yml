services:
  database:
    image: gvenzl/oracle-xe:latest
    container_name: aztlan-db
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PASSWORD=${ORACLE_PASSWORD} # Lee del .env
    volumes:
      - oracle_data:/opt/oracle/oradata

  backend:
    build: 
      context: ./springApp/AztlanShop
      dockerfile: Dockerfile
    container_name: aztlan-back
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@database:1521/xe
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${ORACLE_PASSWORD}
    depends_on:
      - database

  frontend:
    build: ./reactApp/AztlanShopFront
    container_name: aztlan-front
    ports:
      - "5173:5173" # Cambiamos 3000 por 5173
    environment:
      - VITE_API_URL=http://localhost:8080/graphql
    stdin_open: true # Para que React no se cierre en Docker
    tty: true
volumes:
  oracle_data: